name: Auto Unzip Project and Build APK
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  unzip-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check and Unzip Project File
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            echo "Zip file detected! Starting auto-unzip..."
            unzip -o *.zip -d ./
            rm *.zip
          else
            echo "No zip file found, proceeding with normal build."
          fi

      - name: Commit and Push Unzipped Code Back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated: Unzipped project files cleanly"
            git push
          else
            echo "No new files to commit."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android App
        run: |
          # একদম সঠিক ফোল্ডারটি খুঁজে বের করার জন্য লজিক
          echo "🔍 Searching for project root..."
          GRADLE_FILE=$(find . -name "settings.gradle" | head -n 1)
          
          if [ -z "$GRADLE_FILE" ]; then
            echo "❌ Error: Could not find settings.gradle file. Stopping build."
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$GRADLE_FILE")
          echo "✅ Project found inside: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          echo "🛠️ Auto-generating a clean AndroidManifest.xml..."
          mkdir -p app/src/main/
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:name=".OkAetherApp"
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="OkAether Showcase"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.OkAetherShowcase">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.OkAetherShowcase"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          echo "🚀 Starting Gradle build..."
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OkAether-Showcase-App
          path: "**/app/build/outputs/apk/debug/*.apk"
