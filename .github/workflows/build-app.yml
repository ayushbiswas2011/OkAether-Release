name: Auto Unzip Project and Build APK
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  unzip-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check and Unzip Project File
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            echo "Zip file detected! Starting auto-unzip..."
            unzip -o *.zip -d ./
            rm *.zip
          else
            echo "No zip file found, proceeding with normal build."
          fi

      - name: Commit and Push Unzipped Code Back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated: Unzipped project files cleanly"
            git push
          else
            echo "No new files to commit."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android App
        run: |
          PROJECT_DIR=$(dirname $(find . -name "settings.gradle*" | head -n 1))
          echo "✅ Project found inside: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OkAether-Showcase-App
          path: "**/app/build/outputs/apk/debug/*.apk"
